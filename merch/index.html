<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blurhie - merch</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="../style.css" />
  <style>
    .merch-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 100px 20px 60px;
      text-align: center;
      min-height: 60vh;
    }
    .merch-title {
      font-family: 'Emilys Candy', cursive;
      font-size: 2.5rem;
      color: white;
      margin-top: 20px;
    }
    .loading-dots {
      animation: blink 1.4s infinite;
      margin-left: 2px;
    }
    .loading-dots:nth-child(2) {
      animation-delay: 0.2s;
    }
    .loading-dots:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes blink {
      0%, 60%, 100% {
        opacity: 0.3;
      }
      30% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- ===== Mobile slide-out menu ===== -->
  <input type="checkbox" id="menu-toggle" class="menu-toggle" />
  <label for="menu-toggle" class="menu-icon">
    <span class="icon-bar top"></span>
    <span class="icon-bar middle"></span>
    <span class="icon-bar bottom"></span>
  </label>
  <nav class="mobile-nav">
    <div class="mobile-links">
      <a href="/video">video</a>
      <a href="/discography">discography</a>
      <a href="/merch">merch</a>
      <a href="/contact">contact</a>
    </div>
    <div class="mobile-socials">
      <a href="https://www.instagram.com/blurhie/" target="_blank"><img src="/instagram.png" alt="Instagram" /></a>
      <a href="https://www.youtube.com/@blurhie" target="_blank"><img src="/youtube.png" alt="YouTube" /></a>
      <a href="https://open.spotify.com/artist/1Xd1McRlmnoEWNLTGzkG1K" target="_blank"><img src="/spotify.png" alt="Spotify" /></a>
      <a href="https://soundcloud.com/blurhie" target="_blank"><img src="/soundcloud.png" alt="SoundCloud" /></a>
      <a href="https://music.apple.com/us/artist/blurhie/1602081536" target="_blank"><img src="/applemusic.png" alt="Apple Music" /></a>
    </div>
  </nav>
  <!-- ============================== -->
  <!-- Desktop Top Bar -->
  <div class="top-bar">
    <div class="top-left">
      <a href="/video" class="nav-text">Video</a>
      <a href="/discography" class="nav-text">Discography</a>
      <a href="/merch" class="nav-text">Merch</a>
      <a href="/contact" class="nav-text">Contact</a>
    </div>
    <div class="top-right">
      <a href="https://www.instagram.com/blurhie/" target="_blank"><img src="/instagram.png" alt="Instagram" /></a>
      <a href="https://www.youtube.com/@blurhie" target="_blank"><img src="/youtube.png" alt="YouTube" /></a>
      <a href="https://open.spotify.com/artist/1Xd1McRlmnoEWNLTGzkG1K" target="_blank"><img src="/spotify.png" alt="Spotify" /></a>
      <a href="https://soundcloud.com/blurhie" target="_blank"><img src="/soundcloud.png" alt="SoundCloud" /></a>
      <a href="https://music.apple.com/us/artist/blurhie/1602081536" target="_blank"><img src="/applemusic.png" alt="Apple Music" /></a>
    </div>
  </div>
  <!-- Logo -->
  <div class="logo-header">
    <a href="/"><img src="/blurhie-logo.png" alt="blurhie logo" class="logo" /></a>
  </div>
  <!-- Merch Coming Soon Section -->
  <div class="merch-container">
    <div class="merch-title">merch coming soon<span class="loading-dots">.</span><span class="loading-dots">.</span><span class="loading-dots">.</span></div>
  </div>
  <!-- Social icons at the bottom of the page -->
  <div class="social-footer">
    <a href="https://www.instagram.com/blurhie/" target="_blank"><img src="/instagram.png" alt="Instagram" /></a>
    <a href="https://www.youtube.com/@blurhie" target="_blank"><img src="/youtube.png" alt="YouTube" /></a>
    <a href="https://open.spotify.com/artist/1Xd1McRlmnoEWNLTGzkG1K" target="_blank"><img src="/spotify.png" alt="Spotify" /></a>
    <a href="https://soundcloud.com/blurhie" target="_blank"><img src="/soundcloud.png" alt="SoundCloud" /></a>
    <a href="https://music.apple.com/us/artist/blurhie/1602081536" target="_blank"><img src="/applemusic.png" alt="Apple Music" /></a>
  </div>
</body>
</html>
